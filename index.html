<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>App Onix — Organização financeira</title>
  <link rel="stylesheet" href="app/styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- Core data & report (plain scripts) -->
  <script src="app/data.js"></script>
  <script src="app/firebase.js"></script>
  <script src="app/report.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App (compiled by Babel; load order matters: components defines shared hooks) -->
  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/auth.jsx"></script>
  <script type="text/babel" src="app/components.jsx"></script>
  <script type="text/babel" src="app/charts.jsx"></script>
  <script type="text/babel" src="app/painel.jsx"></script>
  <script type="text/babel" src="app/custos.jsx"></script>
  <script type="text/babel" src="app/socios.jsx"></script>
  <script type="text/babel" src="app/analises.jsx"></script>
  <script type="text/babel" src="app/ajustes.jsx"></script>
  <script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
